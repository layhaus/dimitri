<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimitri &mdash; File Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #1a1714;
            --paper: #f5f0e8;
            --paper-warm: #efe9dd;
            --paper-deep: #e8e0d0;
            --accent: #c45a3c;
            --accent-hover: #a8482e;
            --accent-glow: rgba(196, 90, 60, 0.12);
            --muted: #8a8279;
            --muted-light: #b0a99e;
            --border: #d6cfc3;
            --success: #5a8a5c;
            --error: #b84a3c;
            --shadow-sm: 0 1px 3px rgba(26, 23, 20, 0.06);
            --shadow-md: 0 4px 16px rgba(26, 23, 20, 0.08);
            --shadow-lg: 0 8px 32px rgba(26, 23, 20, 0.1);
            --radius: 6px;
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'Instrument Sans', -apple-system, sans-serif;
        }

        html { font-size: 16px; }

        body {
            font-family: var(--font-body);
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── Grain overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        @keyframes checkmark {
            from { stroke-dashoffset: 24; }
            to { stroke-dashoffset: 0; }
        }

        .animate-in {
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        /* ── Layout ── */
        .app-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── Header ── */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--paper);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.4s ease both;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--ink);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .logo-mark {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: var(--font-body);
            transform: rotate(-3deg);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-badge {
            font-size: 0.8rem;
            color: var(--muted);
            padding: 0.35rem 0.75rem;
            background: var(--paper-warm);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .admin-indicator {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
        }

        .btn-logout {
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            background: none;
            border: 1px solid var(--border);
            padding: 0.4rem 0.9rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-logout:hover {
            color: var(--ink);
            border-color: var(--muted-light);
            background: var(--paper-warm);
        }

        /* ── Auth Screen ── */
        .auth-screen {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            font-family: var(--font-display);
            font-size: 2.5rem;
            color: var(--ink);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .auth-logo .logo-mark {
            width: 36px;
            height: 36px;
            font-size: 1rem;
        }

        .auth-subtitle {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .auth-card {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.75rem;
            background: var(--paper);
            border-radius: var(--radius);
            padding: 3px;
        }

        .auth-tab {
            flex: 1;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.55rem 1rem;
            border: none;
            background: none;
            color: var(--muted);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.25s ease;
        }

        .auth-tab.active {
            background: white;
            color: var(--ink);
            box-shadow: var(--shadow-sm);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            width: 100%;
            font-family: var(--font-body);
            font-size: 0.9rem;
            padding: 0.65rem 0.85rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--paper);
            color: var(--ink);
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder {
            color: var(--muted-light);
        }

        .btn-primary {
            width: 100%;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auth-error {
            background: rgba(184, 74, 60, 0.08);
            border: 1px solid rgba(184, 74, 60, 0.2);
            color: var(--error);
            padding: 0.6rem 0.85rem;
            border-radius: var(--radius);
            font-size: 0.82rem;
            margin-bottom: 1rem;
            animation: scaleIn 0.3s ease both;
        }

        .auth-success {
            background: rgba(90, 138, 92, 0.08);
            border: 1px solid rgba(90, 138, 92, 0.2);
            color: var(--success);
            padding: 0.6rem 0.85rem;
            border-radius: var(--radius);
            font-size: 0.82rem;
            margin-bottom: 1rem;
            animation: scaleIn 0.3s ease both;
        }

        /* ── PB URL config ── */
        .pb-config {
            margin-top: 1.5rem;
            text-align: center;
        }

        .pb-config-toggle {
            font-family: var(--font-body);
            font-size: 0.75rem;
            color: var(--muted-light);
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .pb-config-toggle:hover {
            color: var(--muted);
        }

        .pb-config-field {
            margin-top: 0.75rem;
            display: none;
        }

        .pb-config-field.visible {
            display: block;
            animation: fadeUp 0.3s ease both;
        }

        .pb-config-field input {
            width: 100%;
            font-family: var(--font-body);
            font-size: 0.8rem;
            padding: 0.5rem 0.75rem;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            background: var(--paper-warm);
            color: var(--muted);
            text-align: center;
            outline: none;
        }

        .pb-config-field input:focus {
            border-style: solid;
            border-color: var(--accent);
            color: var(--ink);
        }

        /* ── Main Dashboard ── */
        .dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.6rem;
            margin-bottom: 0.35rem;
            color: var(--ink);
        }

        .section-subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 1.75rem;
        }

        /* ── Upload Zone ── */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 2.5rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            margin-bottom: 2.5rem;
            position: relative;
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .upload-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-glow);
            transform: scale(1.01);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .upload-zone.uploading {
            pointer-events: none;
            opacity: 0.7;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 1rem;
            color: var(--muted-light);
            transition: color 0.3s ease;
        }

        .upload-zone:hover .upload-icon {
            color: var(--accent);
        }

        .upload-text {
            font-size: 0.95rem;
            color: var(--ink);
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .upload-hint {
            font-size: 0.8rem;
            color: var(--muted-light);
        }

        .upload-input {
            display: none;
        }

        .upload-progress {
            display: none;
            margin-top: 1rem;
        }

        .upload-progress.visible {
            display: block;
            animation: fadeIn 0.3s ease both;
        }

        .progress-bar {
            height: 4px;
            background: var(--paper-deep);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s ease;
            animation: pulse 1s ease-in-out infinite;
        }

        .upload-status {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 0.5rem;
        }

        /* ── File List ── */
        .files-section {
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
        }

        .files-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .files-count {
            font-size: 0.78rem;
            color: var(--muted-light);
            font-weight: 500;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .file-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 1rem;
            align-items: center;
            padding: 1rem 1.25rem;
            background: white;
            transition: background 0.15s ease;
            animation: fadeIn 0.3s ease both;
        }

        .file-item:hover {
            background: var(--paper);
        }

        .file-icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .file-icon.type-image { background: #fef3c7; color: #d97706; }
        .file-icon.type-pdf { background: #fee2e2; color: #dc2626; }
        .file-icon.type-doc { background: #dbeafe; color: #2563eb; }
        .file-icon.type-code { background: #e0e7ff; color: #4f46e5; }
        .file-icon.type-archive { background: #d1fae5; color: #059669; }
        .file-icon.type-default { background: var(--paper-deep); color: var(--muted); }

        .file-info {
            min-width: 0;
        }

        .file-name {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 0.75rem;
            color: var(--muted-light);
            margin-top: 0.15rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .file-meta .dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--border);
        }

        .file-uploader {
            font-size: 0.75rem;
            color: var(--muted);
            padding: 0.2rem 0.6rem;
            background: var(--paper);
            border-radius: 12px;
            white-space: nowrap;
        }

        .file-download {
            width: 32px;
            height: 32px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: none;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .file-download:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .empty-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 1rem;
            color: var(--muted-light);
            opacity: 0.5;
        }

        .empty-title {
            font-family: var(--font-display);
            font-size: 1.15rem;
            color: var(--ink);
            margin-bottom: 0.3rem;
        }

        .empty-text {
            font-size: 0.82rem;
            color: var(--muted-light);
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 0.7rem 1rem;
            border-radius: var(--radius);
            font-size: 0.82rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideDown 0.3s ease both;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            max-width: 340px;
        }

        .toast.success {
            background: var(--success);
            color: white;
        }

        .toast.error {
            background: var(--error);
            color: white;
        }

        .toast.removing {
            animation: fadeOut 0.25s ease both;
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-8px) scale(0.95); }
        }

        /* ── View toggle (user/admin) ── */
        .view-toggle {
            display: flex;
            gap: 0;
            background: var(--paper-warm);
            border-radius: var(--radius);
            padding: 3px;
            margin-bottom: 2rem;
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
            border: 1px solid var(--border);
            width: fit-content;
        }

        .view-toggle-btn {
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 500;
            padding: 0.45rem 1rem;
            border: none;
            background: none;
            color: var(--muted);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.25s ease;
        }

        .view-toggle-btn.active {
            background: white;
            color: var(--ink);
            box-shadow: var(--shadow-sm);
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .app-header {
                padding: 1rem 1.25rem;
            }

            .dashboard {
                padding: 1.5rem 1.25rem;
            }

            .auth-container {
                max-width: 100%;
            }

            .auth-card {
                padding: 1.5rem;
            }

            .file-item {
                grid-template-columns: auto 1fr auto;
                gap: 0.75rem;
                padding: 0.85rem 1rem;
            }

            .file-uploader {
                display: none;
            }

            .upload-zone {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

<div id="app" class="app-shell">
    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="logo-mark">D</div>
                    Dimitri
                </div>
                <p class="auth-subtitle">Your private file vault.<br>Upload, organize, and access your files securely.</p>
            </div>
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Create Account</button>
                </div>

                <div id="authMessage"></div>

                <form id="authForm" onsubmit="handleAuth(event)">
                    <div id="nameField" class="form-group" style="display: none;">
                        <label class="form-label" for="nameInput">Full Name</label>
                        <input class="form-input" type="text" id="nameInput" placeholder="Your name" autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="emailInput">Email</label>
                        <input class="form-input" type="email" id="emailInput" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="passwordInput">Password</label>
                        <input class="form-input" type="password" id="passwordInput" placeholder="Enter your password" required autocomplete="current-password" minlength="8">
                    </div>
                    <div id="confirmField" class="form-group" style="display: none;">
                        <label class="form-label" for="confirmInput">Confirm Password</label>
                        <input class="form-input" type="password" id="confirmInput" placeholder="Confirm your password" autocomplete="new-password">
                    </div>
                    <button class="btn-primary" type="submit" id="authSubmit">Sign In</button>
                </form>
            </div>

            <div class="pb-config">
                <button class="pb-config-toggle" onclick="togglePbConfig()">Server settings</button>
                <div class="pb-config-field" id="pbConfigField">
                    <input type="url" id="pbUrlInput" placeholder="http://127.0.0.1:8090" onchange="updatePbUrl(this.value)">
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardScreen" style="display: none;">
        <header class="app-header">
            <div class="logo">
                <div class="logo-mark">D</div>
                Dimitri
            </div>
            <div class="header-right">
                <span id="adminBadge" class="admin-indicator" style="display: none;">Admin</span>
                <span class="user-badge" id="userBadge"></span>
                <button class="btn-logout" onclick="logout()">Sign Out</button>
            </div>
        </header>

        <main class="dashboard">
            <!-- Admin toggle -->
            <div id="viewToggle" class="view-toggle" style="display: none;">
                <button class="view-toggle-btn active" data-view="my" onclick="switchView('my')">My Files</button>
                <button class="view-toggle-btn" data-view="all" onclick="switchView('all')">All Files</button>
            </div>

            <!-- Upload zone -->
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p class="upload-text">Drop files here or click to browse</p>
                <p class="upload-hint">Any file type, up to 50 MB</p>
                <input type="file" id="fileInput" class="upload-input" onchange="handleFileSelect(event)" multiple>
                <div class="upload-progress" id="uploadProgress">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 100%"></div></div>
                    <p class="upload-status" id="uploadStatus">Uploading...</p>
                </div>
            </div>

            <!-- Files list -->
            <section class="files-section" id="filesSection">
                <div class="files-header">
                    <div>
                        <h2 class="section-title" id="filesTitle">My Files</h2>
                        <p class="section-subtitle" id="filesSubtitle">Your uploaded documents</p>
                    </div>
                    <span class="files-count" id="filesCount"></span>
                </div>
                <div id="filesList"></div>
            </section>
        </main>
    </div>
</div>

<script src="pocketbase.umd.js"></script>
<script>
    // ── State ──
    var pbUrl = localStorage.getItem('pb_url') || window.location.origin;
    var pb = new PocketBase(pbUrl);
    var currentTab = 'login';
    var currentView = 'my';
    var isAdmin = false;

    // ── Init ──
    document.getElementById('pbUrlInput').value = pbUrl;

    if (pb.authStore.isValid) {
        showDashboard();
    }

    // ── Auth ──
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.getElementById('nameField').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('confirmField').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('authSubmit').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
        document.getElementById('authMessage').innerHTML = '';

        if (tab === 'register') {
            document.getElementById('passwordInput').autocomplete = 'new-password';
        } else {
            document.getElementById('passwordInput').autocomplete = 'current-password';
        }
    }

    async function handleAuth(e) {
        e.preventDefault();
        const btn = document.getElementById('authSubmit');
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        const msgEl = document.getElementById('authMessage');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>' + (currentTab === 'login' ? 'Signing in...' : 'Creating account...');

        try {
            if (currentTab === 'register') {
                const name = document.getElementById('nameInput').value.trim();
                const confirm = document.getElementById('confirmInput').value;

                if (password !== confirm) {
                    throw new Error('Passwords do not match');
                }

                await pb.collection('users').create({
                    email,
                    password,
                    passwordConfirm: confirm,
                    name
                });

                msgEl.innerHTML = '<div class="auth-success">Account created! Signing you in...</div>';
                await new Promise(r => setTimeout(r, 600));
            }

            await pb.collection('users').authWithPassword(email, password);
            showDashboard();
        } catch (err) {
            const msg = err.response?.data
                ? Object.values(err.response.data).map(v => v.message).join('. ')
                : err.message || 'Authentication failed';
            msgEl.innerHTML = `<div class="auth-error">${escapeHtml(msg)}</div>`;
        } finally {
            btn.disabled = false;
            btn.textContent = currentTab === 'login' ? 'Sign In' : 'Create Account';
        }
    }

    function logout() {
        pb.authStore.clear();
        document.getElementById('dashboardScreen').style.display = 'none';
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('authForm').reset();
        document.getElementById('authMessage').innerHTML = '';
    }

    // ── Dashboard ──
    function showDashboard() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';

        const record = pb.authStore.record;
        isAdmin = pb.authStore.isSuperuser;

        document.getElementById('userBadge').textContent = record?.email || record?.name || 'User';
        document.getElementById('adminBadge').style.display = isAdmin ? 'inline-block' : 'none';
        document.getElementById('viewToggle').style.display = isAdmin ? 'flex' : 'none';

        currentView = 'my';
        loadFiles();
    }

    // ── View Toggle ──
    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));

        if (view === 'all') {
            document.getElementById('filesTitle').textContent = 'All Files';
            document.getElementById('filesSubtitle').textContent = 'Files from all users';
        } else {
            document.getElementById('filesTitle').textContent = 'My Files';
            document.getElementById('filesSubtitle').textContent = 'Your uploaded documents';
        }

        loadFiles();
    }

    // ── File Upload ──
    var uploadZone = document.getElementById('uploadZone');

    uploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadZone.classList.add('drag-over');
    });

    uploadZone.addEventListener('dragleave', () => {
        uploadZone.classList.remove('drag-over');
    });

    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) {
            uploadFiles(e.dataTransfer.files);
        }
    });

    function handleFileSelect(e) {
        if (e.target.files.length) {
            uploadFiles(e.target.files);
        }
    }

    async function uploadFiles(files) {
        const progressEl = document.getElementById('uploadProgress');
        const statusEl = document.getElementById('uploadStatus');

        uploadZone.classList.add('uploading');
        progressEl.classList.add('visible');

        let uploaded = 0;
        const total = files.length;

        for (const file of files) {
            statusEl.textContent = `Uploading ${file.name}... (${uploaded + 1}/${total})`;

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('user', pb.authStore.record.id);

                await pb.collection('uploads').create(formData);
                uploaded++;
                showToast(`Uploaded ${file.name}`, 'success');
            } catch (err) {
                showToast(`Failed to upload ${file.name}`, 'error');
            }
        }

        uploadZone.classList.remove('uploading');
        progressEl.classList.remove('visible');
        document.getElementById('fileInput').value = '';

        loadFiles();
    }

    // ── Load Files ──
    async function loadFiles() {
        const listEl = document.getElementById('filesList');
        const countEl = document.getElementById('filesCount');

        try {
            var options = {
                sort: '-created',
                expand: 'user',
                requestKey: null
            };

            // For regular users the server listRule already filters to own files.
            // For admins (superusers bypass rules), filter to own uploads in "my" view.
            if (currentView === 'my' && isAdmin) {
                options.filter = pb.filter('user = {:userId}', { userId: pb.authStore.record.id });
            }
            // "all" view (admin only): no filter — show everything

            const records = await pb.collection('uploads').getList(1, 100, options);

            countEl.textContent = `${records.items.length} file${records.items.length !== 1 ? 's' : ''}`;

            if (records.items.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                            <polyline points="13 2 13 9 20 9"/>
                        </svg>
                        <h3 class="empty-title">No files yet</h3>
                        <p class="empty-text">Drop a file above to get started</p>
                    </div>`;
                return;
            }

            listEl.innerHTML = '<div class="file-list">' + records.items.map((record, i) => {
                const fileName = record.file || 'Unnamed file';
                const ext = fileName.split('.').pop().toLowerCase();
                const iconClass = getFileIconClass(ext);
                const iconLabel = ext.substring(0, 4);
                const date = new Date(record.created).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const uploaderName = record.expand?.user?.name || record.expand?.user?.email || 'Unknown';
                const fileUrl = pb.files.getURL(record, record.file);
                const showUploader = currentView === 'all' && isAdmin;

                return `
                    <div class="file-item" style="animation-delay: ${i * 0.04}s">
                        <div class="file-icon ${iconClass}">${escapeHtml(iconLabel)}</div>
                        <div class="file-info">
                            <div class="file-name" title="${escapeHtml(fileName)}">${escapeHtml(fileName)}</div>
                            <div class="file-meta">
                                <span>${date}</span>
                            </div>
                        </div>
                        ${showUploader ? `<span class="file-uploader">${escapeHtml(uploaderName)}</span>` : ''}
                        <a class="file-download" href="${fileUrl}" target="_blank" title="Download" onclick="event.stopPropagation()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                        </a>
                    </div>`;
            }).join('') + '</div>';

        } catch (err) {
            console.error('Failed to load files:', err);
            listEl.innerHTML = `
                <div class="empty-state">
                    <h3 class="empty-title">Could not load files</h3>
                    <p class="empty-text">${escapeHtml(err.message || 'Check your connection and try again')}</p>
                </div>`;
        }
    }

    // ── Helpers ──
    function getFileIconClass(ext) {
        const map = {
            image: ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'bmp', 'ico'],
            pdf: ['pdf'],
            doc: ['doc', 'docx', 'txt', 'rtf', 'odt', 'xls', 'xlsx', 'csv', 'ppt', 'pptx'],
            code: ['js', 'ts', 'py', 'rb', 'go', 'rs', 'java', 'c', 'cpp', 'h', 'html', 'css', 'json', 'xml', 'yaml', 'yml', 'sh', 'md'],
            archive: ['zip', 'tar', 'gz', 'rar', '7z', 'bz2']
        };
        for (const [type, exts] of Object.entries(map)) {
            if (exts.includes(ext)) return `type-${type}`;
        }
        return 'type-default';
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                ${type === 'success'
                    ? '<polyline points="20 6 9 17 4 12"/>'
                    : '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'}
            </svg>
            ${escapeHtml(message)}`;
        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('removing');
            setTimeout(() => toast.remove(), 250);
        }, 3000);
    }

    function togglePbConfig() {
        document.getElementById('pbConfigField').classList.toggle('visible');
    }

    function updatePbUrl(url) {
        if (url) {
            pbUrl = url.replace(/\/+$/, '');
            localStorage.setItem('pb_url', pbUrl);
            pb = new PocketBase(pbUrl);
        }
    }
</script>

</body>
</html>
